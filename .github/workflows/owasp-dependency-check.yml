name: OWASP Dependency-Check

on:
  schedule:
    - cron: '0 3 * * *'   # codziennie o 03:00 UTC
  workflow_dispatch:        # możliwość ręcznego uruchomienia

# Anuluj starszy przebieg, jeśli wystartuje nowy.
concurrency:
  group: owasp-dependency-check
  cancel-in-progress: true

jobs:
  dependency-check:
    runs-on: ubuntu-latest
    # BOOTSTRAP: pierwsze, zimne pobranie CAŁEJ bazy NVD (~370 tys. CVE) trwa ~60 min
    # nawet z działającym kluczem. Musi się raz dokończyć, żeby cache zapisał pełną bazę;
    # kolejne noce robią tylko przyrostową aktualizację (kilka min). Timeout 75 min daje
    # zapas na bootstrap. Po pierwszym udanym przebiegu obniżymy z powrotem do 30 min.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Cache bazy NVD - bez tego każdy przebieg pobiera całość od nowa.
      # Klucz zależny od run_id (każdy przebieg zapisuje świeży cache), z fallbackiem do
      # najnowszego dostępnego (przyrostowa aktualizacja danych NVD).
      - name: Cache NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: nvd-data-${{ github.run_id }}
          restore-keys: |
            nvd-data-

      - name: Run OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn -B -Psecurity-scan org.owasp:dependency-check-maven:check

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          if-no-files-found: ignore
