name: Java CI with Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Install xvfb (virtual display for JavaFX tests)
      run: sudo apt-get update && sudo apt-get install -y xvfb

    - name: Build with Maven (clean verify + JaCoCo report)
      run: |
        set -o pipefail
        xvfb-run --auto-servernum mvn -B clean verify 2>&1 | tee mvn.log

    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: surefire-reports
        path: target/surefire-reports/
        if-no-files-found: ignore

    - name: Upload coverage report (JaCoCo)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-coverage
        path: target/site/jacoco/
        if-no-files-found: ignore

    - name: Upload SpotBugs report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: spotbugs-report
        path: target/spotbugsXml.xml
        if-no-files-found: ignore

    - name: Emit failure diagnostics as annotations
      if: failure()
      run: |
        grep -E "^\[ERROR\]" mvn.log | head -6 | while IFS= read -r line; do
          echo "::error::MVN ${line}"
        done
        if [ -d target/surefire-reports ]; then
          for f in target/surefire-reports/*.txt; do
            if grep -qE "Failures: [1-9]|Errors: [1-9]" "$f"; then
              msg=$(tr '\n' ' ' < "$f" | head -c 900)
              echo "::error::SUREFIRE ${msg}"
            fi
          done
        fi
        tail -c 900 mvn.log | tr '\n' ' ' | xargs -0 -I{} echo "::error::TAIL {}"
