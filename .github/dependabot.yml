version: 2
updates:
  # Zależności Maven (biblioteki aplikacji)
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    # Grupujemy drobne aktualizacje, by nie zalewać repo osobnymi PR-ami.
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # Akcje GitHub Actions używane w workflowach CI
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"