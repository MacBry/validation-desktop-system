spring:
  application:
    name: validation-desktop
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:validation_desktop_db}?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none # Flyway zarządza schematem
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    # Migracje wspólne + warianty vendorowe ({vendor} -> mysql / h2).
    # Pliki w mysql/ to oryginały (niezmienione checksumy dla istniejących baz);
    # h2/ zawiera odpowiedniki dla trybu standalone.
    locations: classpath:db/migration/common,classpath:db/migration/{vendor}
    baseline-on-migrate: true
  mail:
    host: ${SMTP_HOST:smtp-relay.brevo.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

javafx:
  title: Validation System - Desktop Edition

app:
  # Język UI: pl (domyślny) lub en; nadpisywalny zmienną APP_LOCALE
  locale: ${APP_LOCALE:pl}
  security:
    inactivity-timeout-minutes: 15
    account-expiration-days: 90
  mail:
    # Adres nadawcy powiadomień systemowych
    from: ${MAIL_FROM:maciej.bryja@wp.pl}
  notifications:
    # Dzienny digest GxP: wygasające świadectwa wzorcowania + zaległe rewalidacje
    enabled: ${GXP_NOTIFICATIONS_ENABLED:true}
    cron: "0 0 7 * * *"          # codziennie 7:00
    advance-days: 30              # próg ostrzeżenia (spójny z dashboardem)
    revalidation-cycle-months: 12
  backup:
    directory: backups/db
    mysql-dump-path: ${MYSQL_DUMP_PATH:C:\\Program Files\\MySQL\\MySQL Server 8.0\\bin\\mysqldump.exe}
    retention-days: 14

# Komenda interpretera Python dla mostów Testo (pełna ścieżka,
# gdy 'python' wskazuje na stub Microsoft Store)
testo:
  python-command: ${TESTO_PYTHON_COMMAND:python}

# ============================================================
# DP-001 Regime-Aware Interpretation Layer
# ZMIEN enabled NA true DOPIERO PO PRZEJSCIU CSV-TC-001..005
# ============================================================

regime:
  detection:
    enabled: true
    ols-window-minutes: 30
    ols-eps-slope: 0.01
    ols-band-width: 1.5
    ols-min-steady-minutes: 30
    cusum-k: 0.5
    cusum-h: 5.0
    cusum-baseline-points: 30
    min-steady-points-for-stats: 30
    excursion-gradient-threshold: 0.5
    excursion-return-window-minutes: 60
    propagation-aware: false
    propagation-cosine-similarity-threshold: 0.7
    propagation-ambiguity-margin: 0.1
    propagation-min-sensors-for-vector: 3
    propagation-default-preset: REAR_WALL
