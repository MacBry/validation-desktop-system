# ============================================================
# Profil STANDALONE — wbudowana baza H2 (plik lokalny),
# zero instalacji MySQL. Aktywacja: DB_MODE=standalone w .env
# lub zmienna środowiskowa SPRING_PROFILES_ACTIVE=standalone.
#
# Dane trafiają do ./data/validation_desktop.mv.db obok aplikacji.
# Backup: DatabaseBackupService używa natywnego H2 "BACKUP TO"
# (spójny zrzut online do ZIP) zamiast mysqldump.
# ============================================================
spring:
  datasource:
    # MODE=MySQL: kompatybilność składni; DATABASE_TO_LOWER + CASE_INSENSITIVE:
    # zachowanie identyfikatorów jak w MySQL na Windows
    url: jdbc:h2:file:${H2_DATA_PATH:./data/validation_desktop};MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password: ${H2_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
